
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.plan { padding: 1rem 0; }
.phase { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 12px; overflow: hidden; }
.phase-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; background: var(--color-background-secondary); }
.phase-header:hover { background: var(--color-background-tertiary); }
.badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
.phase-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.phase-hours { font-size: 13px; color: var(--color-text-secondary); }
.chevron { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.chevron.open { transform: rotate(90deg); }
.phase-body { display: none; padding: 12px 16px; border-top: 0.5px solid var(--color-border-tertiary); }
.phase-body.open { display: block; }
.task { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.task:last-child { border-bottom: none; }
.task-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.task-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
.task-note { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.key-output { font-size: 12px; margin-top: 8px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
.key-output strong { color: var(--color-text-primary); font-weight: 500; }
.timeline { display: flex; gap: 4px; margin-bottom: 16px; }
.tbar { height: 8px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--color-text-secondary); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }
.summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.stat-n { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-l { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.warn { background: var(--color-background-warning); color: var(--color-text-warning); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 14px; }
</style>

<div class="plan">
  <div class="summary-bar">
    <div class="stat"><div class="stat-n">60h</div><div class="stat-l">Total window</div></div>
    <div class="stat"><div class="stat-n">43</div><div class="stat-l">States to train</div></div>
    <div class="stat"><div class="stat-n">4</div><div class="stat-l">Model families</div></div>
    <div class="stat"><div class="stat-n">9</div><div class="stat-l">Phases</div></div>
  </div>

  <div class="warn">⚠ Dates are irregular (1–91 day gaps). Must resample to W-SUN before anything else — this is the #1 gotcha in this dataset.</div>

  <div class="timeline">
    <div class="tbar" style="width:3.3%;background:#9FE1CB;" title="Setup 2h"></div>
    <div class="tbar" style="width:6.7%;background:#5DCAA5;" title="Data 4h"></div>
    <div class="tbar" style="width:6.7%;background:#1D9E75;" title="Features 4h"></div>
    <div class="tbar" style="width:5%;background:#AFA9EC;" title="ARIMA 3h"></div>
    <div class="tbar" style="width:5%;background:#7F77DD;" title="Prophet 3h"></div>
    <div class="tbar" style="width:6.7%;background:#534AB7;" title="XGBoost 4h"></div>
    <div class="tbar" style="width:10%;background:#3C3489;" title="LSTM 6h"></div>
    <div class="tbar" style="width:6.7%;background:#FAC775;" title="Pipeline 4h"></div>
    <div class="tbar" style="width:10%;background:#EF9F27;" title="API 6h"></div>
    <div class="tbar" style="width:6.7%;background:#F5C4B3;" title="Dashboard 4h"></div>
    <div class="tbar" style="width:6.7%;background:#F0997B;" title="Docs 4h"></div>
    <div class="tbar" style="width:6.7%;background:#D85A30;" title="Video 4h"></div>
    <div class="tbar" style="width:13.3%;background:#D3D1C7;" title="Buffer 8h"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#9FE1CB"></div>Setup</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Data + Features</div>
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>Models</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>Pipeline + API</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Dashboard + Docs + Video</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D3D1C7"></div>Buffer</div>
  </div>

  <div id="phases"></div>
</div>

<script>
const phases = [
  {
    n: 0, title: "Project setup", hours: "2h", color: "#9FE1CB",
    tasks: [
      { text: "Create repo structure", note: "src/, data/, artifacts/, tests/, dashboard/" },
      { text: "config.yaml — single source of truth", note: "All model params, CV settings, paths live here" },
      { text: "requirements.txt / pyproject.toml", note: "pandas, statsmodels, prophet, xgboost, torch, fastapi, streamlit, joblib, optuna" },
      { text: "utils: logging, seed, model registry", note: "Timestamped versioned registry under artifacts/registry/v<TS>/" },
    ],
    output: "Runnable skeleton with importable package structure"
  },
  {
    n: 1, title: "Data pipeline", hours: "4h", color: "#5DCAA5",
    tasks: [
      { text: "DataLoader: load xlsx, schema validate, parse mixed-format dates" },
      { text: "Preprocessor: resample to W-SUN per state (CRITICAL)", note: "Dates are irregular — gaps from 1 to 91 days. Weekly resample fills the holes." },
      { text: "Imputation: linear interpolation → ffill → bfill", note: "After resampling, fill any created NaN gaps" },
      { text: "Outlier handling: IQR clip per state (cap, not drop)" },
      { text: "Walk-forward split generator", note: "Expanding train window, fixed 8-week test, ≥3 folds per state. No leakage." },
    ],
    output: "Clean weekly per-state DataFrame, CV fold generator"
  },
  {
    n: 2, title: "Feature engineering", hours: "4h", color: "#1D9E75",
    tasks: [
      { text: "Lag features: t-1, t-7, t-30 (mandatory per brief)" },
      { text: "Rolling mean & std: 4-week, 8-week, 13-week windows" },
      { text: "Time features: week_of_year, month, quarter, year" },
      { text: "Holiday flag: US federal holidays via pandas_holidays or hardcoded list", note: "Binary flag for holiday weeks" },
      { text: "Fourier terms: sin/cos pairs for annual seasonality", note: "Helps XGBoost and LSTM capture seasonality without Prophet" },
      { text: "Wrap as FeatureEngineer class with fit/transform — serialize with joblib" },
    ],
    output: "FeatureEngineer class that transforms any state's series → feature matrix"
  },
  {
    n: 3, title: "ARIMA / SARIMA", hours: "3h", color: "#AFA9EC",
    tasks: [
      { text: "Use statsmodels SARIMAX", note: "auto_arima from pmdarima for order selection" },
      { text: "SARIMA order: (p,d,q)(P,D,Q,52) — weekly seasonality period = 52" },
      { text: "Fit per state, predict 8 weeks ahead (multi-step: refit each step or recursive)" },
      { text: "Wrap in ARIMAModel class with fit(series)/predict(horizon) interface" },
    ],
    output: "ARIMAModel class, serializable with joblib"
  },
  {
    n: 4, title: "Facebook Prophet", hours: "3h", color: "#7F77DD",
    tasks: [
      { text: "prophet.Prophet with weekly_seasonality=True, yearly_seasonality=True" },
      { text: "Add US holidays as holiday dataframe" },
      { text: "Fit on ds/y format, predict 8 weeks, extract yhat" },
      { text: "Wrap in ProphetModel class — serialize with joblib" },
    ],
    output: "ProphetModel class"
  },
  {
    n: 5, title: "XGBoost (lag features)", hours: "4h", color: "#534AB7",
    tasks: [
      { text: "Build feature matrix: lags + rolling + time features + Fourier + holiday flag" },
      { text: "Direct multi-step: train separate model per horizon step (h=1…8)", note: "Or recursive: predict h=1, append to history, predict h=2, etc. Direct is cleaner." },
      { text: "Optuna HPO: learning_rate, max_depth, n_estimators, subsample (50 trials)", note: "Run HPO on first fold only to save time" },
      { text: "SHAP feature importance: plot top-10 features per state" },
      { text: "Wrap in XGBoostModel class" },
    ],
    output: "XGBoostModel class with optional SHAP plots"
  },
  {
    n: 6, title: "LSTM (PyTorch)", hours: "6h", color: "#3C3489",
    tasks: [
      { text: "Sequence-to-sequence: lookback=52 weeks → predict 8 steps" },
      { text: "Architecture: 2-layer LSTM (hidden=64) → Linear(8)", note: "Multi-step direct output in one forward pass" },
      { text: "MinMaxScaler per state (fit on train only — no leakage)" },
      { text: "Training: Adam, MSE loss, 50 epochs, early stopping on val loss" },
      { text: "Wrap in LSTMModel class with fit/predict, serialize state_dict + scaler" },
    ],
    output: "LSTMModel class"
  },
  {
    n: 7, title: "Training pipeline + auto-selection", hours: "4h", color: "#FAC775",
    tasks: [
      { text: "TrainingPipeline: for each state → walk-forward CV → score RMSE/MAE/MAPE/SMAPE per model" },
      { text: "Auto-select top-2 models by mean CV RMSE per state" },
      { text: "Ensemble: inverse-RMSE weighted average of top-2 predictions" },
      { text: "Refit best models on full history → serialize to artifacts/registry/v<TS>/states/<State>/" },
      { text: "Write manifest.json + metadata.json (selected models, weights, metrics)" },
      { text: "Parallelize across states with joblib.Parallel (n_jobs=-1)" },
    ],
    output: "CLI: python -m src.training.cli --states all. Full versioned registry."
  },
  {
    n: 8, title: "FastAPI service", hours: "6h", color: "#EF9F27",
    tasks: [
      { text: "GET /health — status + registry version + states_available" },
      { text: "GET /states — list of trained states" },
      { text: "POST /train — async background job, returns job_id" },
      { text: "GET /train/{job_id} — poll status (pending/running/done/failed)" },
      { text: "GET /predict?state=X&horizon=8 — 8-week forecast with CI (residual bootstrap)" },
      { text: "GET /predict/breakdown?state=X — per-member forecasts + ensemble weights" },
      { text: "GET /metrics — per-state CV metrics + selected models" },
      { text: "GET /backtest?state=X — walk-forward realized vs predicted" },
      { text: "Lazy-load model bundles from registry, cache in memory" },
    ],
    output: "uvicorn src.api.app:app — full OpenAPI docs at /docs"
  },
  {
    n: 9, title: "Streamlit dashboard", hours: "4h", color: "#F0997B",
    tasks: [
      { text: "State selector sidebar → calls /predict, /metrics, /backtest" },
      { text: "Forecast tab: line chart with CI band, ensemble + members" },
      { text: "Backtest tab: realized vs predicted per fold" },
      { text: "Metrics tab: model comparison table + RMSE bar chart" },
    ],
    output: "streamlit run dashboard/app.py — visual demo for video"
  },
  {
    n: 10, title: "Docs + video", hours: "8h", color: "#D85A30",
    tasks: [
      { text: "README.md: architecture diagram, setup, run commands, API table" },
      { text: "Inline docstrings on all public classes/functions" },
      { text: "Video: 5–8 min screen recording — training CLI → API endpoints in Postman → Streamlit dashboard" },
    ],
    output: "Final submission: code + README + video link"
  },
];

const container = document.getElementById('phases');
phases.forEach(p => {
  const div = document.createElement('div');
  div.className = 'phase';
  div.innerHTML = `
    <div class="phase-header" onclick="toggle(this)">
      <div class="tbar" style="width:10px;height:10px;border-radius:3px;background:${p.color};flex-shrink:0"></div>
      <span class="phase-title">Phase ${p.n}: ${p.title}</span>
      <span class="phase-hours">${p.hours}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="phase-body">
      ${p.tasks.map(t => `
        <div class="task">
          <div class="task-dot" style="background:${p.color}"></div>
          <div>
            <div class="task-text">${t.text}</div>
            ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
          </div>
        </div>
      `).join('')}
      ${p.output ? `<div class="key-output">✓ <strong>Output:</strong> ${p.output}</div>` : ''}
    </div>
  `;
  container.appendChild(div);
});

function toggle(header) {
  header.querySelector('.chevron').classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// Open phase 0 by default
document.querySelector('.phase-header').click();
</script>
